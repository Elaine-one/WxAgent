model_router:
  default: deepseek-chat
  routes:
    text:
      model: deepseek-chat
      provider: openai
      base_url: https://api.deepseek.com/v1
    vision:
      model: gpt-4o
      provider: openai
      base_url: https://api.openai.com/v1
  task_overrides:
    # planning 使用强推理模型。如用 Claude 需设 provider: anthropic 且 pip install anthropic
    planning:
      model: deepseek-chat
      provider: openai
      base_url: https://api.deepseek.com/v1
    code_execution:
      model: deepseek-chat
      provider: openai
  rates:
    deepseek-chat:
      input: 0.28
      output: 0.88
    gpt-4o:
      input: 2.50
      output: 10.00
    claude-sonnet-4-6:
      input: 3.00
      output: 15.00

security:
  dev_mode: false
  risk_levels:
    safe:
      - dir
      - ls
      - type
      - echo
      - netstat
      - systeminfo
      - where
      - python --version
      - git status
      - git log
      - git diff
      - tasklist
      - whoami
      - ipconfig
      - ping
    caution:
      - pip install
      - pip uninstall
      - git push
      - git fetch
      - git pull
      - git add
      - git commit
      - python -c
      - python -m http.server
      - npm install
    dangerous:
      - del
      - rm
      - rd
      - rmdir
      - taskkill
      - kill
      - shutdown
      - restart
      - reg
      - format
      - fdisk
      - chkdsk
      - sfc
      - bcdedit
      - net user
      - wmic
      - schtasks
      - mshta
      - certutil
      - bitsadmin
      - powershell -enc
      - cmd /c
  path_sandbox:
    write_roots:
      - workspace/
      - workspace/output/
      - workspace/temp/
      - workspace/scripts/
      - workspace/downloads/
    read_roots:
      - ./
      - ~/Desktop
      - ~/Downloads
      - ~/Documents
    denied_patterns:
      - .ssh
      - .gnupg
      - .env
      - AppData/Roaming/Microsoft
      - NTUSER.DAT

ai_reviewer:
  enabled: true
  review_levels:
    - caution
  model: deepseek-chat
  max_command_length: 500

workspace:
  dir: workspace
  subdirs:
    - downloads
    - temp
    - output
    - scripts
    - data
  venv_packages:
    basic:
      - pandas
      - numpy
      - matplotlib
      - openpyxl
      - pdfplumber
      - python-docx
      - Pillow
      - requests
      - beautifulsoup4
      - lxml
      - chardet
    full:
      - faster-whisper
      - paddleocr
      - paddlepaddle
      - ffmpeg-python
      - yt-dlp

limits:
  max_llm_calls_per_task: 10
  max_history: 20
  max_tokens_per_day: 500000
  max_retries_per_step: 3
  python_timeout_seconds: 60
  python_max_output_bytes: 50000
  shell_timeout_seconds: 30

indexer:
  enabled: false  # 是否启用后台文件索引（需 ChromaDB + SentenceTransformer，基础模式建议关闭）
  watch_dirs:
    - ~/Desktop
    - ~/Downloads
    - ~/Documents
  supported_types:
    - .txt
    - .md
    - .pdf
    - .docx
    - .pptx
    - .xlsx
    - .py
    - .js
    - .csv
  idle_cpu_threshold: 20
  scan_interval_seconds: 300
  max_document_chars: 8000
  use_watchdog: true

retriever:
  vector_weight: 0.5
  keyword_weight: 0.3
  time_decay_weight: 0.2
  time_decay_half_life_days: 30
  default_scope:
    - files
    - facts
  default_top_k: 10

file_organize:
  rules:
    by_type:
      images: [".jpg", ".jpeg", ".png", ".gif", ".bmp", ".svg", ".webp"]
      documents: [".pdf", ".docx", ".xlsx", ".pptx", ".txt", ".md", ".doc"]
      videos: [".mp4", ".avi", ".mkv", ".mov", ".wmv", ".flv"]
      audio: [".mp3", ".wav", ".flac", ".aac", ".ogg"]
      archives: [".zip", ".rar", ".7z", ".tar", ".gz", ".bz2"]
      code: [".py", ".js", ".ts", ".java", ".cpp", ".go", ".rs"]
    by_date:
      format: "%Y-%m"
    by_ext:
      group_by: suffix

system_control:
  actions:
    sleep:
      command: "rundll32 powrprof.dll,SetSuspendState 0,1,0"
      risk: dangerous
      description: "休眠电脑"
    lock:
      command: "rundll32 user32.dll,LockWorkStation"
      risk: dangerous
      description: "锁屏"
    volume_up:
      command: '(New-Object -ComObject WScript.Shell).SendKeys([char]175)'
      risk: safe
      description: "音量增大"
      shell: powershell
    volume_down:
      command: '(New-Object -ComObject WScript.Shell).SendKeys([char]174)'
      risk: safe
      description: "音量减小"
      shell: powershell
    mute:
      command: '(New-Object -ComObject WScript.Shell).SendKeys([char]173)'
      risk: safe
      description: "静音切换"
      shell: powershell
  app_whitelist:
    code: "code"
    vscode: "code"
    chrome: "start chrome"
    firefox: "start firefox"
    notepad: "notepad"
    calculator: "calc"
    explorer: "explorer"

scenarios:
  work_mode:
    description: "工作模式"
    actions:
      - tool: open_app
        args: {app_name: "code"}
      - tool: open_app
        args: {app_name: "chrome"}
      - tool: system_action
        args: {action: "volume_down"}
  meeting_mode:
    description: "会议模式"
    actions:
      - tool: system_action
        args: {action: "mute"}
      - tool: system_action
        args: {action: "lock"}
  focus_mode:
    description: "专注模式"
    actions:
      - tool: system_action
        args: {action: "volume_down"}
